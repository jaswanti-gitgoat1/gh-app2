---
# IaC - Kubernetes manifests with insecure configurations

# Pod running as root with privileged access (CKV_K8S_6, CKV_K8S_16)
apiVersion: v1
kind: Pod
metadata:
  name: insecure-pod
spec:
  hostNetwork: true                          # Host network access
  hostPID: true                              # Host PID namespace
  hostIPC: true                              # Host IPC namespace
  containers:
    - name: app
      image: nginx:1.14.0                    # Old vulnerable image
      securityContext:
        privileged: true                     # Privileged container
        runAsRoot: true                      # Running as root
        allowPrivilegeEscalation: true       # Privilege escalation
        readOnlyRootFilesystem: false        # Writable filesystem
        capabilities:
          add: ["ALL"]                       # All capabilities added
      env:
        - name: DB_PASSWORD
          value: "k8s_hardcoded_pass_123"    # Secret in plain env var
        - name: API_KEY
          value: "k8s_hardcoded_api_key"
      resources: {}                          # No resource limits

---
# Deployment - insecure (CKV_K8S_8, CKV_K8S_9)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insecure-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insecure
  template:
    metadata:
      labels:
        app: insecure
    spec:
      automountServiceAccountToken: true     # Auto-mount SA token
      containers:
        - name: app
          image: python:2.7                  # Deprecated Python 2.7
          imagePullPolicy: Never
          securityContext:
            runAsNonRoot: false              # May run as root
            privileged: true
          ports:
            - containerPort: 8080
          volumeMounts:
            - mountPath: /host
              name: host-vol
          resources: {}                      # No CPU/memory limits
      volumes:
        - name: host-vol
          hostPath:
            path: /                          # Mounts host root filesystem

---
# Service - NodePort exposed externally
apiVersion: v1
kind: Service
metadata:
  name: insecure-service
spec:
  type: NodePort                             # External exposure
  selector:
    app: insecure
  ports:
    - port: 80
      nodePort: 30080

---
# ClusterRoleBinding - overly permissive (CKV_K8S_49)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: insecure-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin                        # Full cluster admin
subjects:
  - kind: ServiceAccount
    name: default                            # Default service account
    namespace: default

---
# Secret stored as plaintext ConfigMap (not using Secret resource)
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  db_password: "configmap_plain_password"    # Secret in ConfigMap
  api_key: "configmap_plain_api_key"
  jwt_secret: "configmap_jwt_secret"

---
# Ingress - no TLS (CKV_K8S_152)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: insecure-ingress
spec:
  rules:
    - host: example.com
      http:                                  # HTTP only, no HTTPS
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: insecure-service
                port:
                  number: 80

---
# NetworkPolicy - allows all traffic (no restriction)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all
spec:
  podSelector: {}
  ingress:
    - {}                                     # Allow all ingress
  egress:
    - {}                                     # Allow all egress
